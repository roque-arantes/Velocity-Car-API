<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VelocityCar | Clients</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070913;
      --panel: rgba(15, 20, 36, 0.9);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f0f8ff;
      --muted: #96a6bf;
      --primary: #00d4ff;
      --secondary: #a375ff;
      --ok: #7cffbf;
      --danger: #ff5c76;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "Rajdhani", sans-serif;
      background:
        radial-gradient(circle at 15% 18%, rgba(0, 212, 255, 0.15), transparent 32%),
        radial-gradient(circle at 82% 85%, rgba(163, 117, 255, 0.16), transparent 34%),
        var(--bg);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 26px 18px 36px; }
    .header {
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
      margin-bottom: 22px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
    }
    h1 { font-family: "Orbitron", sans-serif; color: var(--primary); font-size: 1.8rem; }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav a {
      text-decoration: none; color: var(--text); border: 1px solid var(--line);
      border-radius: 999px; padding: 8px 12px; font-weight: 700; background: rgba(255,255,255,0.03);
    }
    .nav a:hover { border-color: var(--secondary); }
    .panel {
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 14px;
    }
    .panel h2 { font-family: "Orbitron", sans-serif; font-size: 0.98rem; margin-bottom: 10px; color: var(--secondary); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 14px; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    label { display: block; margin-top: 8px; font-size: 0.86rem; color: var(--muted); }
    input, select, button {
      width: 100%; margin-top: 4px; border-radius: 9px; border: 1px solid var(--line);
      background: rgba(0,0,0,0.24); color: var(--text); padding: 10px 12px; font-family: inherit; font-size: 1rem;
    }
    input:focus, select:focus { outline: none; border-color: var(--primary); }
    button { cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; transition: .2s ease; }
    button:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #06121a; }
    .btn-ok { background: linear-gradient(90deg, #35d890, var(--ok)); color: #052514; }
    .btn-danger { background: linear-gradient(90deg, #ff89a0, var(--danger)); color: #2a0d13; }
    pre {
      margin-top: 10px; background: rgba(0, 0, 0, 0.33); border: 1px solid var(--line);
      border-radius: 10px; padding: 12px; max-height: 320px; overflow: auto; color: #96ffc5; font-size: .86rem;
    }
    @media (max-width: 700px) { .cols { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>👤 CLIENT HUB</h1>
      <nav class="nav">
        <a href="./index.html">Dashboard</a>
        <a href="./cars.html">Carros</a>
        <a href="./service-orders.html">Ordens</a>
      </nav>
    </header>

    <section class="panel">
      <h2>API Base URL</h2>
      <input id="base" placeholder="http://localhost:8080" />
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Novo cliente (POST /client)</h2>
        <div class="cols">
          <label>Nome<input id="name" placeholder="João Silva" /></label>
          <label>CPF<input id="cpf" placeholder="123.456.789-00" /></label>
          <label>Telefone<input id="phoneNumber" placeholder="(11) 99999-9999" /></label>
          <label>Email<input id="email" placeholder="joao@email.com" /></label>
          <label>CEP<input id="cep" placeholder="01234-567" /></label>
          <label>Ativo
            <select id="isActive">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
        </div>
        <label>Endereço<input id="address" placeholder="Rua Exemplo, 123" /></label>
        <button class="btn-primary" id="create">Cadastrar</button>
      </article>

      <article class="panel">
        <h2>Consultar (GET /client e /client/{id})</h2>
        <button class="btn-ok" id="list">Listar todos</button>
        <label>ID<input id="getId" type="number" placeholder="ID do cliente" /></label>
        <button class="btn-ok" id="find">Buscar por ID</button>
      </article>

      <article class="panel">
        <h2>Filtro de status (GET /client/filter/active)</h2>
        <label>isActive
          <select id="activeFilter">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </label>
        <button class="btn-ok" id="filterActive">Filtrar</button>
      </article>

      <article class="panel">
        <h2>Atualizar / Remover</h2>
        <label>ID para atualizar<input id="updateId" type="number" /></label>
        <div class="cols">
          <label>Nome<input id="uName" /></label>
          <label>CPF<input id="uCpf" /></label>
          <label>Telefone<input id="uPhoneNumber" /></label>
          <label>Email<input id="uEmail" /></label>
          <label>CEP<input id="uCep" /></label>
          <label>Ativo
            <select id="uIsActive">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
        </div>
        <label>Endereço<input id="uAddress" /></label>
        <button class="btn-primary" id="update">Atualizar</button>
        <label>ID para remover<input id="deleteId" type="number" /></label>
        <button class="btn-danger" id="remove">Remover</button>
      </article>
    </section>

    <pre id="output">Aguardando comando...</pre>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const out = (value) => { $("output").textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2); };
    const baseKey = "velocitycar_api_base";
    $("base").value = localStorage.getItem(baseKey) || "http://localhost:8080";
    $("base").addEventListener("change", () => localStorage.setItem(baseKey, $("base").value.trim()));
    const api = () => $("base").value.trim();

    async function req(path, options = {}) {
      const response = await fetch(`${api()}${path}`, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const raw = await response.text();
      let body;
      try { body = raw ? JSON.parse(raw) : null; } catch { body = raw; }
      if (!response.ok) throw new Error(JSON.stringify({ status: response.status, body }, null, 2));
      return body;
    }

    const toBool = (value) => String(value).trim().toLowerCase() === "true";

    $("create").onclick = async () => {
      try {
        const payload = {
          name: $("name").value,
          cpf: $("cpf").value,
          phoneNumber: $("phoneNumber").value,
          email: $("email").value,
          address: $("address").value,
          cep: $("cep").value,
          isActive: toBool($("isActive").value)
        };
        out(await req("/client", { method: "POST", body: JSON.stringify(payload) }));
      } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("list").onclick = async () => {
      try { out(await req("/client")); } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("find").onclick = async () => {
      try { out(await req(`/client/${$("getId").value}`)); } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("filterActive").onclick = async () => {
      try { out(await req(`/client/filter/active?isActive=${toBool($("activeFilter").value)}`)); } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("update").onclick = async () => {
      try {
        const payload = {
          name: $("uName").value,
          cpf: $("uCpf").value,
          phoneNumber: $("uPhoneNumber").value,
          email: $("uEmail").value,
          address: $("uAddress").value,
          cep: $("uCep").value,
          isActive: toBool($("uIsActive").value)
        };
        out(await req(`/client/${$("updateId").value}`, { method: "PUT", body: JSON.stringify(payload) }));
      } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("remove").onclick = async () => {
      try {
        await req(`/client/${$("deleteId").value}`, { method: "DELETE" });
        out("Cliente removido com sucesso.");
      } catch (error) { out(`Erro: ${error.message}`); }
    };
  </script>
</body>
</html>
