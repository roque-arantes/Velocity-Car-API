<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VelocityCar | Garage</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090a0f;
      --panel: rgba(18, 20, 30, 0.9);
      --line: rgba(255, 255, 255, 0.09);
      --text: #f4f8ff;
      --muted: #97a0b3;
      --primary: #ff6a3d;
      --secondary: #ffbf59;
      --ok: #6affbc;
      --danger: #ff5167;
      --aux: #00d4ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "Rajdhani", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(255,106,61,0.16), transparent 30%),
        radial-gradient(circle at 80% 85%, rgba(0,212,255,0.12), transparent 30%),
        var(--bg);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 26px 18px 36px; }
    .header {
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
      margin-bottom: 22px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
    }
    h1 { font-family: "Orbitron", sans-serif; color: var(--primary); font-size: 1.8rem; }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav a {
      text-decoration: none; color: var(--text); border: 1px solid var(--line);
      border-radius: 999px; padding: 8px 12px; font-weight: 700;
      background: rgba(255,255,255,0.03);
    }
    .nav a:hover { border-color: var(--aux); }
    .panel {
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px;
      margin-bottom: 14px;
    }
    .panel h2 { font-family: "Orbitron", sans-serif; font-size: 0.98rem; margin-bottom: 10px; color: var(--secondary); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 14px; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    label { display: block; margin-top: 8px; font-size: 0.86rem; color: var(--muted); }
    input, button {
      width: 100%; margin-top: 4px; border-radius: 9px; border: 1px solid var(--line);
      background: rgba(0,0,0,0.25); color: var(--text); padding: 10px 12px; font-family: inherit;
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: var(--aux); }
    button {
      cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; transition: .2s ease;
    }
    button:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #1a0e09; }
    .btn-ok { background: linear-gradient(90deg, #35d890, var(--ok)); color: #052514; }
    .btn-danger { background: linear-gradient(90deg, #ff7a8d, var(--danger)); color: #2a0d13; }
    pre {
      margin-top: 10px; background: rgba(0, 0, 0, 0.32); border: 1px solid var(--line);
      border-radius: 10px; padding: 12px; max-height: 320px; overflow: auto; color: #96ffc5;
      font-size: .86rem;
    }
    @media (max-width: 700px) { .cols { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>🚗 VELOCITY GARAGE</h1>
      <nav class="nav">
        <a href="./index.html">Dashboard</a>
        <a href="./clients.html">Clientes</a>
        <a href="./service-orders.html">Ordens</a>
      </nav>
    </header>

    <section class="panel">
      <h2>API Base URL</h2>
      <input id="base" placeholder="http://localhost:8080" />
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Novo veículo (POST /car)</h2>
        <div class="cols">
          <label>Marca<input id="brand" placeholder="Ferrari" /></label>
          <label>Modelo<input id="model" placeholder="296 GTB" /></label>
          <label>Cor<input id="color" placeholder="Rosso Corsa" /></label>
          <label>Chassi<input id="chassiNumber" placeholder="9BWZZZ377VT" /></label>
          <label>Ano fabricação<input id="yearManufacture" type="number" placeholder="2024" /></label>
          <label>Ano modelo<input id="yearModel" type="number" placeholder="2025" /></label>
        </div>
        <label>Preço<input id="price" type="number" step="0.01" placeholder="850000.00" /></label>
        <button class="btn-primary" id="create">Cadastrar</button>
      </article>

      <article class="panel">
        <h2>Consultar (GET /car e /car/{id})</h2>
        <button class="btn-ok" id="list">Listar todos</button>
        <label>ID<input id="getId" type="number" placeholder="ID do carro" /></label>
        <button class="btn-ok" id="find">Buscar por ID</button>
      </article>

      <article class="panel">
        <h2>Filtros</h2>
        <label>Faixa de preço</label>
        <div class="cols">
          <input id="priceMin" type="number" step="0.01" placeholder="mínimo" />
          <input id="priceMax" type="number" step="0.01" placeholder="máximo" />
        </div>
        <button class="btn-ok" id="filterPrice">Filtrar por preço</button>

        <label>Ano de fabricação</label>
        <input id="year" type="number" placeholder="2024" />
        <button class="btn-ok" id="filterYear">Filtrar por ano</button>

        <label>Cor</label>
        <input id="colorFilter" placeholder="preto" />
        <button class="btn-ok" id="filterColor">Filtrar por cor</button>
      </article>

      <article class="panel">
        <h2>Atualizar / Remover</h2>
        <label>ID para atualizar<input id="updateId" type="number" /></label>
        <div class="cols">
          <label>Marca<input id="uBrand" /></label>
          <label>Modelo<input id="uModel" /></label>
          <label>Cor<input id="uColor" /></label>
          <label>Ano fabricação<input id="uYearManufacture" type="number" /></label>
          <label>Ano modelo<input id="uYearModel" type="number" /></label>
          <label>Preço<input id="uPrice" type="number" step="0.01" /></label>
        </div>
        <button class="btn-primary" id="update">Atualizar</button>
        <label>ID para remover<input id="deleteId" type="number" /></label>
        <button class="btn-danger" id="remove">Remover</button>
      </article>
    </section>

    <pre id="output">Aguardando comando...</pre>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const out = (value) => { $("output").textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2); };
    const baseKey = "velocitycar_api_base";
    $("base").value = localStorage.getItem(baseKey) || "http://localhost:8080";
    $("base").addEventListener("change", () => localStorage.setItem(baseKey, $("base").value.trim()));
    const api = () => $("base").value.trim();

    async function req(path, options = {}) {
      const response = await fetch(`${api()}${path}`, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const raw = await response.text();
      let body;
      try { body = raw ? JSON.parse(raw) : null; } catch { body = raw; }
      if (!response.ok) throw new Error(JSON.stringify({ status: response.status, body }, null, 2));
      return body;
    }

    const numberOrNull = (value) => {
      if (value === "" || value == null) return null;
      const num = Number(value);
      if (Number.isNaN(num)) throw new Error("Valor numérico inválido.");
      return num;
    };

    $("create").onclick = async () => {
      try {
        const payload = {
          brand: $("brand").value,
          model: $("model").value,
          color: $("color").value,
          chassiNumber: $("chassiNumber").value,
          yearManufacture: numberOrNull($("yearManufacture").value),
          yearModel: numberOrNull($("yearModel").value),
          price: numberOrNull($("price").value)
        };
        out(await req("/car", { method: "POST", body: JSON.stringify(payload) }));
      } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("list").onclick = async () => {
      try { out(await req("/car")); } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("find").onclick = async () => {
      try { out(await req(`/car/${$("getId").value}`)); } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("filterPrice").onclick = async () => {
      try {
        const min = numberOrNull($("priceMin").value);
        const max = numberOrNull($("priceMax").value);
        out(await req(`/car/filter/price?min=${min}&max=${max}`));
      } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("filterYear").onclick = async () => {
      try { out(await req(`/car/filter/year?year=${numberOrNull($("year").value)}`)); } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("filterColor").onclick = async () => {
      try { out(await req(`/car/filter/color?color=${encodeURIComponent($("colorFilter").value.trim())}`)); } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("update").onclick = async () => {
      try {
        const payload = {
          brand: $("uBrand").value,
          model: $("uModel").value,
          color: $("uColor").value,
          yearManufacture: numberOrNull($("uYearManufacture").value),
          yearModel: numberOrNull($("uYearModel").value),
          price: numberOrNull($("uPrice").value)
        };
        out(await req(`/car/${$("updateId").value}`, { method: "PUT", body: JSON.stringify(payload) }));
      } catch (error) { out(`Erro: ${error.message}`); }
    };

    $("remove").onclick = async () => {
      try {
        await req(`/car/${$("deleteId").value}`, { method: "DELETE" });
        out("Carro removido com sucesso.");
      } catch (error) { out(`Erro: ${error.message}`); }
    };
  </script>
</body>
</html>
